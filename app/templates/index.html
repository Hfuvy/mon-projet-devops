<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon App DevOps</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="container d-flex vh-100 align-items-center justify-content-center">
        <div class="card shadow-lg p-5 text-center" style="max-width: 600px; border-radius: 20px;">
            <div class="mb-4 text-primary">
                <i class="fas fa-rocket fa-5x"></i>
            </div>
            <h1 class="display-4 fw-bold text-primary">DevOps en action !</h1>
            <p class="lead text-secondary">Version 4.0 - Environnement : <span class="badge bg-warning text-dark">{{ env }}</span></p>
            <hr>
            <div class="mt-3">
                <span class="badge bg-success fs-2 p-3">
                    <i class="fas fa-eye me-2"></i> Visites : {{ compteur }}
                </span>
            </div>
            <div class="mt-4 d-flex justify-content-center gap-3">
                <a href="{{ url_for('main.login') }}" class="btn btn-success btn-lg">
                    <i class="fas fa-lock me-2"></i> Connexion
                </a>
                <a href="{{ url_for('main.signup') }}" class="btn btn-outline-primary btn-lg">
                    <i class="fas fa-user-plus me-2"></i> Inscription
                </a>
            </div>
            <p class="mt-4 text-muted small">
                <i class="fas fa-screwdriver-wrench me-1"></i> Déployé automatiquement via CI/CD
            </p>
            <p class="text-muted small">
                <i class="fas fa-cloud me-1"></i> Hébergé sur Render.com
            </p>
        </div>
    </div>
</body>
</html>
