<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistiques - TaskFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand"><i class="fas fa-chart-bar me-2"></i> Statistiques</span>
            <a href="{{ url_for('main.dashboard') }}" class="btn btn-outline-light">
                <i class="fas fa-arrow-left me-1"></i> Retour
            </a>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- 4 cartes au lieu de 3 -->
        <div class="row g-4">
            <div class="col-md-3">
                <div class="card text-center">
                    <div class="card-body">
                        <h5>Total Tâches</h5>
                        <h1 id="total-count" class="text-primary">0</h1>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center border-success">
                    <div class="card-body">
                        <h5>Terminées</h5>
                        <h1 id="done-count" class="text-success">0</h1>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center border-warning">
                    <div class="card-body">
                        <h5>En cours</h5>
                        <h1 id="pending-count" class="text-warning">0</h1>
                    </div>
                </div>
            </div>
            <!-- ✅ NOUVELLE CARTE : Projets -->
            <div class="col-md-3">
                <div class="card text-center border-info">
                    <div class="card-body">
                        <h5><i class="fas fa-project-diagram me-1"></i> Projets</h5>
                        <h1 id="projects-count" class="text-info">0</h1>
                    </div>
                </div>
            </div>
        </div>

        <!-- Graphique avec largeur limitée -->
        <div class="card mt-4">
            <div class="card-body text-center">
                <div style="max-width: 800px; margin: 0 auto; height: 300px;">
                    <canvas id="tasksChart"></canvas>
                </div>
            </div>
        </div>
        <div id="chartError" class="alert alert-danger mt-3 d-none">
            <i class="fas fa-exclamation-triangle me-2"></i> Impossible de charger les données.
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            fetch('/api/stats-data')
                .then(response => {
                    if (!response.ok) throw new Error('Erreur réseau');
                    return response.json();
                })
                .then(data => {
                    // Mettre à jour les 4 cartes
                    document.getElementById('total-count').textContent = data.total;
                    document.getElementById('done-count').textContent = data.done;
                    document.getElementById('pending-count').textContent = data.pending;
                    document.getElementById('projects-count').textContent = data.projects; // ✅ Nouveau

                    // Vérifier les données du graphique
                    if (data.labels && data.counts && data.labels.length > 0) {
                        const ctx = document.getElementById('tasksChart').getContext('2d');
                        new Chart(ctx, {
                            type: 'bar',
                            data: {
                                labels: data.labels,
                                datasets: [{
                                    label: 'Tâches créées par jour',
                                    data: data.counts,
                                    backgroundColor: 'rgba(13, 110, 253, 0.6)',
                                    borderColor: 'rgba(13, 110, 253, 1)',
                                    borderWidth: 2,
                                    borderRadius: 6
                                }]
                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: false,
                                plugins: {
                                    legend: { display: false }
                                },
                                scales: {
                                    y: {
                                        beginAtZero: true,
                                        ticks: { stepSize: 1 }
                                    }
                                }
                            }
                        });
                    } else {
                        document.getElementById('chartError').classList.remove('d-none');
                    }
                })
                .catch(error => {
                    console.error('Erreur:', error);
                    document.getElementById('chartError').classList.remove('d-none');
                });
        });
    </script>
</body>
</html>
