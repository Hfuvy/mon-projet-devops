name: CI - Build, Test et Push sur Docker Hub

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # 1. Récupérer le code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Configurer Docker Buildx (pour les builds optimisés)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 3. Se connecter à Docker Hub avec les secrets
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # 4. Builder l'image avec 2 tags : "latest" et le SHA du commit
      - name: Build et Push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/mon-projet-devops:latest
            ${{ secrets.DOCKER_USERNAME }}/mon-projet-devops:${{ github.sha }}
          
      # 5. (Optionnel mais cool) Tester l'image qui vient d'être poussée
      # On la télécharge depuis Docker Hub pour vérifier qu'elle est accessible
      - name: Test de l'image depuis Docker Hub
        run: |
          docker run -d -p 5000:5000 --name test-app ${{ secrets.DOCKER_USERNAME }}/mon-projet-devops:latest
          sleep 3
          curl --fail http://localhost:5000 || exit 1
          docker stop test-app && docker rm test-app