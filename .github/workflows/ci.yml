name: CI - Build et push Docker

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build l'image Docker
        run: |
          docker build -t mon-app-devops:latest .

      - name: Test rapide du container
        run: |
          docker run -d -p 5000:5000 --name test-app mon-app-devops:latest
          sleep 3
          curl --fail http://localhost:5000 || exit 1
          docker stop test-app && docker rm test-app
