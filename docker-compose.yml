services:
  # ========== SERVICES EXISTANTS ==========
  db:
    image: postgres:15-alpine
    container_name: ma-bdd
    environment:
      POSTGRES_DB: monappdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    restart: always
    networks:
      - taskflow-network

  web:
    build: .
    container_name: mon-app-web
    ports:
      - "5000:5000"
    environment:
      ENV: "COMPOSE"
      DATABASE_URL: "postgresql://admin:secret@db:5432/monappdb"
      SECRET_KEY: "clef-pour-le-dev-local"
    depends_on:
      - db
    restart: always
    networks:
      - taskflow-network

  # ========== NOUVEAUX SERVICES DE MONITORING ==========
  
  # Prometheus : collecte les métriques
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - taskflow-network
    restart: unless-stopped

  # Grafana : visualisation des métriques et logs
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/:/etc/grafana/provisioning/
    networks:
      - taskflow-network
    depends_on:
      - prometheus
    restart: unless-stopped

  # Loki : stockage des logs
  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - taskflow-network
    restart: unless-stopped

  # Promtail : collecteur de logs
  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers
      - ./promtail-config.yml:/etc/promtail/promtail-config.yml
    command: -config.file=/etc/promtail/promtail-config.yml
    networks:
      - taskflow-network
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  taskflow-network:
    driver: bridge